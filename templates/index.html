<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyLog</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header>
    <h1>📚 StudyLog</h1>
    <p>タスク・学習記録管理</p>
  </header>

  <main>
    <!-- タスク入力フォーム -->
    <section class="form-section">
      <h2>タスクを追加</h2>
      <form action="/add" method="POST">
        <input type="text" name="name" placeholder="タスク名を入力" required />
        <input type="date" name="date" />
        <button type="submit">追加</button>
      </form>
    </section>

    <!-- タスク一覧 -->
    <section class="task-section">
      <h2>タスク一覧</h2>
      {% if tasks %}
      <ul class="task-list">
        {% for task in tasks %}
        <li class="task-item {% if task['done'] %}done{% endif %}">
          <span class="task-name">{{ task['name'] }}</span>
          <span class="task-date">{{ task['date'] or '日付なし' }}</span>
          <a href="/done/{{ task['id'] }}">
            <button class="done-btn">
              {% if task['done'] %}戻す{% else %}完了{% endif %}
            </button>
          </a>
          <a href="/delete/{{ task['id'] }}">
            <button class="delete-btn">削除</button>
          </a>
        </li>
        {% endfor %}
      </ul>
      {% else %}
      <p class="empty">タスクがありません。追加してみましょう！</p>
      {% endif %}
    </section>
  </main>

  <footer>
    <p>StudyLog &copy; 2025</p>
  </footer>

</body>
</html>
